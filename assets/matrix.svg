<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="поэлементное и матричное умножение">
  <rect width="640" height="360" fill="#f9fbfc"/>
  <text x="40" y="48" font-family="Arial" font-size="24" font-weight="700" fill="#17202a">Матрицы: * и @</text>
  <text x="54" y="104" font-family="Consolas" font-size="22" fill="#0f766e">m1 * m2</text>
  <text x="54" y="138" font-family="Arial" font-size="17" fill="#365267">поэлементное умножение</text>
  <text x="54" y="190" font-family="Consolas" font-size="22" fill="#2563eb">m1 @ m2</text>
  <text x="54" y="224" font-family="Arial" font-size="17" fill="#365267">матричное умножение</text>
  <g transform="translate(330 88)" font-family="Consolas" font-size="18" text-anchor="middle">
    <rect width="58" height="46" rx="5" fill="#d9f3ef" stroke="#0f766e"/><text x="29" y="29">3</text>
    <rect x="66" width="58" height="46" rx="5" fill="#d9f3ef" stroke="#0f766e"/><text x="95" y="29">1</text>
    <rect y="54" width="58" height="46" rx="5" fill="#d9f3ef" stroke="#0f766e"/><text x="29" y="83">8</text>
    <rect x="66" y="54" width="58" height="46" rx="5" fill="#d9f3ef" stroke="#0f766e"/><text x="95" y="83">2</text>
    <text x="160" y="60" font-size="28" fill="#17202a">@</text>
    <rect x="200" width="58" height="46" rx="5" fill="#e8f0ff" stroke="#2563eb"/><text x="229" y="29">6</text>
    <rect x="266" width="58" height="46" rx="5" fill="#e8f0ff" stroke="#2563eb"/><text x="295" y="29">1</text>
    <rect x="200" y="54" width="58" height="46" rx="5" fill="#e8f0ff" stroke="#2563eb"/><text x="229" y="83">7</text>
    <rect x="266" y="54" width="58" height="46" rx="5" fill="#e8f0ff" stroke="#2563eb"/><text x="295" y="83">9</text>
  </g>
  <text x="330" y="246" font-family="Consolas" font-size="20" fill="#17202a">элемент = 3*6 + 1*7</text>
  <text x="330" y="282" font-family="Consolas" font-size="20" fill="#17202a">np.dot(row, col)</text>
</svg>
