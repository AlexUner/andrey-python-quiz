  <g transform="translate(58 92)">
    <rect width="72" height="58" rx="6" fill="#d9f3ef" stroke="#0f766e"/>
    <rect x="78" width="72" height="58" rx="6" fill="#d9f3ef" stroke="#0f766e"/>
    <rect x="156" width="72" height="58" rx="6" fill="#d9f3ef" stroke="#0f766e"/>
