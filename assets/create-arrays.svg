<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="создание массивов">
  <rect width="640" height="360" fill="#f9fbfc"/>
  <text x="40" y="48" font-family="Arial" font-size="24" font-weight="700" fill="#17202a">Создание массивов</text>
  <g font-family="Consolas" font-size="18">
    <text x="52" y="104" fill="#0f766e">np.zeros((2, 3))</text>
    <text x="52" y="178" fill="#2563eb">np.arange(0, 10, 2)</text>
    <text x="52" y="252" fill="#a15c00">np.linspace(0, 10, 5)</text>
  </g>
  <g transform="translate(330 78)" font-family="Arial" font-size="18" text-anchor="middle">
    <rect width="54" height="42" rx="5" fill="#d9f3ef" stroke="#0f766e"/><text x="27" y="27">0</text>
    <rect x="62" width="54" height="42" rx="5" fill="#d9f3ef" stroke="#0f766e"/><text x="89" y="27">0</text>
    <rect x="124" width="54" height="42" rx="5" fill="#d9f3ef" stroke="#0f766e"/><text x="151" y="27">0</text>
    <rect y="50" width="54" height="42" rx="5" fill="#d9f3ef" stroke="#0f766e"/><text x="27" y="77">0</text>
    <rect x="62" y="50" width="54" height="42" rx="5" fill="#d9f3ef" stroke="#0f766e"/><text x="89" y="77">0</text>
    <rect x="124" y="50" width="54" height="42" rx="5" fill="#d9f3ef" stroke="#0f766e"/><text x="151" y="77">0</text>
  </g>
  <text x="330" y="178" font-family="Consolas" font-size="22" fill="#17202a">[0, 2, 4, 6, 8]</text>
  <text x="330" y="252" font-family="Consolas" font-size="22" fill="#17202a">[0, 2.5, 5, 7.5, 10]</text>
</svg>
